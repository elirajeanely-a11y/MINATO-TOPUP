<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINATO TOPUP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            padding: 30px 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 78, 80, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Bwat pou mete ID a */
        .id-section {
            background-color: #1a1a1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .id-section label {
            display: block;
            font-size: 16px;
            font-weight: bold;
            color: #f9d423;
            margin-bottom: 10px;
        }

        .id-section input {
            width: 90%;
            max-width: 300px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ff4e50;
            border-radius: 8px;
            background-color: #121214;
            color: #fff;
            text-align: center;
            outline: none;
            font-weight: bold;
        }

        .id-section input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        h2 {
            margin-top: 30px;
            color: #f9d423;
            font-size: 20px;
        }

        .grid-pri {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .kat-dyaman {
            background-color: #1a1a1e;
            border: 2px solid #2a2a30;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .kat-dyaman:hover {
            border-color: #f9d423;
            transform: translateY(-3px);
        }

        .kat-dyaman:active {
            transform: scale(0.95);
        }

        .kat-dyaman .kantite {
            font-size: 18px;
            font-weight: bold;
            color: #00e5ff;
            display: block;
            margin-bottom: 5px;
        }

        .kat-dyaman .pri {
            font-size: 16px;
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ MINATO TOPUP ⚡</h1>
        <p>Achte Dyaman Free Fire Ou Rapid, Pwòp Ak Sekirite</p>
    </header>

    <div class="container">
        
        <!-- SEKSYON KOTE KLIYAN AN AP METE ID LI ANVAN -->
        <div class="id-section">
            <label for="id_jwe">🆔 ANTRE ID FREE FIRE OU ANVAN :</label>
            <input type="number" id="id_jwe" placeholder="Egzanp: 556656" required>
        </div>

        <h2>💎 KLIKE SOU PAKÈT OU VLE A KOURYEN AN 💎</h2>
        
        <div class="grid-pri">
            <div class="kat-dyaman" onclick="voyeKòmand('110', '160G')">
                <span class="kantite">💎 110 Dyaman</span>
                <span class="pri">160 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('310', '500G')">
                <span class="kantite">💎 310 Dyaman</span>
                <span class="pri">500 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('520', '800G')">
                <span class="kantite">💎 520 Dyaman</span>
                <span class="pri">800 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('1060', '1600G')">
                <span class="kantite">💎 1060 Dyaman</span>
                <span class="pri">1,600 G</span>
            </div>
        </div>
    </div>

    <script>
        function voyeKòmand(kantite, pri) {
            // Pran sa kliyan an tape nan bwat ID a
            let idJwe = document.getElementById('id_jwe').value.trim();
            
            // Si kliyan an pa mete ID a, jwèt la ap ba li yon avètisman epi li pap pati
            if (idJwe === "") {
                alert("⚠️ Tanpri antre ID Free Fire ou anvan ou chwazi yon pakèt dyaman!");
                document.getElementById('id_jwe').focus();
                return;
            }
            
            let nimewoTelefon = "50943228468"; 
            
            // Mesaj la ap pran vrè ID moun nan te tape a otomatikman
            let tèksMesaj = "Bonjou *MINATO TOPUP*, mwen vle fè yon kòmand:\n\n" +
                            "🎮 *Jwèt:* Free Fire\n" +
                            "🆔 *ID Jwè:* " + idJwe + "\n" +
                            "💎 *Kantite:* " + kantite + " Dyaman\n" +
                            "💰 *Pri:* " + pri + "\n\n" +
                            "Tanpri ban m metòd peman an pou m ka peye rapid!";
            
            let mesajKode = encodeURIComponent(tèksMesaj);
            window.location.href = "https://wa.me/" + nimewoTelefon + "?text=" + mesajKode;
        }
    </script>

</body>
</html>
