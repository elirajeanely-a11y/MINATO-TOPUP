<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINATO TOPUP</title>
    <style>
        /* Koulè jeneral ak estil paj la */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214; /* Fon nwa tankou jwèt */
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Bannè ki nan tèt la */
        header {
            background: linear-gradient(135deg, #ff4e50, #f9d423); /* Bèl koulè fliyoresan */
            padding: 30px 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 78, 80, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        /* Seksyon pou kat dyaman yo */
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 25px;
            color: #f9d423;
            font-size: 20px;
        }

        .grid-pri {
            display: grid;
            grid-template-columns: 1fr 1fr; /* De kolòn pwòp sou mobil */
            gap: 15px;
            margin-top: 15px;
        }

        /* Stil pou chak ti bwat dyaman */
        .kat-dyaman {
            background-color: #1a1a1e;
            border: 2px solid #2a2a30;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .kat-dyaman:hover {
            border-color: #f9d423;
            transform: translateY(-3px);
        }

        .kat-dyaman:active {
            transform: scale(0.95);
        }

        .kat-dyaman .kantite {
            font-size: 18px;
            font-weight: bold;
            color: #00e5ff; /* Koulè cyan pou dyaman an */
            display: block;
            margin-bottom: 5px;
        }

        .kat-dyaman .pri {
            font-size: 16px;
            color: #2ecc71; /* Pri an vèt */
            font-weight: bold;
        }

        /* Ti nòt anba grid la */
        .not-sistèm {
            margin-top: 20px;
            font-size: 13px;
            color: #aaaaaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Bannè Tèt Paj la -->
    <header>
        <h1>⚡ MINATO TOPUP ⚡</h1>
        <p>Achte Dyaman Free Fire Ou Rapid, Pwòp Ak Sekirite</p>
    </header>

    <div class="container">
        <h2>💎 KLIKE SOU KANTITE OU VLE A 💎</h2>
        
        <!-- Grid ak fonksyon pou voye mesaj WhatsApp lè yo klike -->
        <div class="grid-pri">
            <div class="kat-dyaman" onclick="voyeKòmand('110', '160G')">
                <span class="kantite">💎 110 Dyaman</span>
                <span class="pri">160 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('310', '500G')">
                <span class="kantite">💎 310 Dyaman</span>
                <span class="pri">500 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('520', '800G')">
                <span class="kantite">💎 520 Dyaman</span>
                <span class="pri">800 G</span>
            </div>
            
            <div class="kat-dyaman" onclick="voyeKòmand('1060', '1600G')">
                <span class="kantite">💎 1060 Dyaman</span>
                <span class="pri">1,600 G</span>
            </div>
        </div>

        <p class="not-sistèm">Lè ou klike sou yon pakèt, sa ap mennen ou dirèkteman sou WhatsApp pou finalize kòmand lan.</p>
    </div>

    <!-- Kòd pou jere otomatik mesaj WhatsApp la -->
    <script>
        function voyeKòmand(kantite, pri) {
            // Nimewo WhatsApp ou ak tout kòd peyi a (509)
            let nimewoTelefon = "50943228468"; 
            
            // Tèks mesaj la byen fòmate ak grès (*) ak bèl sote liy
            let tèksMesaj = "Bonjou *MINATO TOPUP*, mwen vle fè yon kòmand:\n\n" +
                            "🎮 *Jwèt:* Free Fire\n" +
                            "🆔 *ID Jwè:* _ \n" +
                            "💎 *Kantite:* " + kantite + " Dyaman\n" +
                            "💰 *Pri:* " + pri + "\n\n" +
                            "Tanpri ban m metòd peman an pou m ka peye rapid!";
            
            // Konvèti tèks la pou l ka pase nan yon lyen entènèt (URL Encode)
            let mesajKode = encodeURIComponent(tèksMesaj);
            
            // Louvri WhatsApp dirèkteman
            window.location.href = "https://wa.me/" + nimewoTelefon + "?text=" + mesajKode;
        }
    </script>

</body>
</html>
